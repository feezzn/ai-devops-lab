# Este workflow pode rodar em dois modos:
# - teste: simula uma falha de build para demonstrar a analise
# - real: usa um log existente do repositorio sem falhar a branch principal
name: Analise de Logs CI com IA

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de execucao do workflow"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - real

permissions:
  contents: read

concurrency:
  group: ai-cicd-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Os secrets ficam no GitHub e nunca devem ser fixados no arquivo YAML.
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
      RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'real' }}
      LOG_FILE: samples/build.log
      ANALYSIS_FILE: samples/analysis.json
      SUMMARY_FILE: samples/summary.md
      SAMPLE_LOG_FILE: samples/sample_ci_failure.log
    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Mostrar modo selecionado
        shell: bash
        run: |
          echo "Modo atual: $RUN_MODE"

      - name: Simular build com falha e capturar logs
        if: env.RUN_MODE == 'test'
        id: simulated_build
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p "$(dirname "$LOG_FILE")"
          {
            echo "[INFO] Iniciando build simulado"
            echo "[INFO] Instalando dependencias do projeto"
            echo "ERROR: Could not find a version that satisfies the requirement internal-package==9.9.9"
            echo "ERROR: No matching distribution found for internal-package==9.9.9"
            echo "[ERROR] Falha no build durante a instalacao de dependencias"
            exit 1
          } 2>&1 | tee "$LOG_FILE"

      - name: Preparar log de entrada no modo real
        if: env.RUN_MODE == 'real'
        shell: bash
        run: |
          mkdir -p "$(dirname "$LOG_FILE")"
          cp "$SAMPLE_LOG_FILE" "$LOG_FILE"

      - name: Verificar configuracao do Azure OpenAI
        if: always()
        id: azure_config
        shell: bash
        run: |
          missing=0
          for var in AZURE_OPENAI_API_KEY AZURE_OPENAI_ENDPOINT AZURE_OPENAI_DEPLOYMENT; do
            if [ -z "${!var}" ]; then
              echo "Variavel ausente: $var" >&2
              missing=1
            fi
          done
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Analisar logs capturados com Azure OpenAI
        id: azure_analysis
        if: always() && steps.azure_config.outputs.missing == '0'
        continue-on-error: true
        run: |
          python scripts/analyze_logs.py \
            --log-file "$LOG_FILE" \
            --output-file "$ANALYSIS_FILE"

      - name: Gerar resumo de fallback sem IA
        if: always() && (steps.azure_config.outputs.missing != '0' || steps.azure_analysis.outcome == 'failure')
        shell: bash
        run: |
          mkdir -p "$(dirname "$ANALYSIS_FILE")"
          cat > "$ANALYSIS_FILE" <<'EOF'
          {
            "summary": "A analise com IA nao produziu um resultado valido e o workflow gerou um fallback local.",
            "root_cause": "Ausencia de secrets obrigatorios ou falha na execucao do script de analise.",
            "category": "unknown",
            "recommended_actions": [
              "Conferir AZURE_OPENAI_API_KEY, AZURE_OPENAI_ENDPOINT e AZURE_OPENAI_DEPLOYMENT no GitHub.",
              "Verificar se a dependencia openai foi instalada corretamente no runner.",
              "Reexecutar o workflow apos corrigir o erro da etapa de analise."
            ],
            "confidence_score": 1.0,
            "evidence": [
              "O workflow detectou ausencia de configuracao obrigatoria ou falha na etapa Azure OpenAI."
            ]
          }
          EOF

      - name: Gerar resumo em Markdown
        if: always()
        run: |
          python scripts/render_summary.py \
            --input-file "$ANALYSIS_FILE" \
            --output-file "$SUMMARY_FILE"

      - name: Publicar resumo do job
        if: always()
        shell: bash
        run: cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Enviar artefatos da analise
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-cicd-debug-report
          path: |
            samples/build.log
            samples/analysis.json
            samples/summary.md

      - name: Marcar job como falho no modo teste
        if: always() && env.RUN_MODE == 'test' && steps.simulated_build.outcome == 'failure'
        shell: bash
        run: |
          echo "O build simulado falhou como esperado. Veja o resumo acima." >&2
          exit 1
