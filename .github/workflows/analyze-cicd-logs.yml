# This workflow simulates a failing build, captures logs, analyzes them with Azure OpenAI,
# and publishes a Markdown summary in the GitHub Actions job summary.
name: AI CI Log Analysis

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  analyze-failing-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Keep credentials in GitHub Secrets rather than hardcoding them in the workflow.
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
      LOG_FILE: ai-devops-lab/samples/build.log
      ANALYSIS_FILE: ai-devops-lab/samples/analysis.json
      SUMMARY_FILE: ai-devops-lab/samples/summary.md
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ai-devops-lab/requirements.txt

      - name: Install Python dependencies
        working-directory: ai-devops-lab
        run: pip install -r requirements.txt

      - name: Simulate failing build and capture logs
        id: simulated_build
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p "$(dirname "$LOG_FILE")"
          {
            echo "[INFO] Starting simulated CI build"
            echo "[INFO] Installing project dependencies"
            echo "ERROR: Could not find a version that satisfies the requirement internal-package==9.9.9"
            echo "ERROR: No matching distribution found for internal-package==9.9.9"
            echo "[ERROR] Build failed during dependency installation"
            exit 1
          } 2>&1 | tee "$LOG_FILE"

      - name: Verify Azure OpenAI configuration
        if: always()
        shell: bash
        run: |
          missing=0
          for var in AZURE_OPENAI_API_KEY AZURE_OPENAI_ENDPOINT AZURE_OPENAI_DEPLOYMENT; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Analyze captured logs with Azure OpenAI
        if: always()
        working-directory: ai-devops-lab
        run: |
          python scripts/analyze_logs.py \
            --log-file "$GITHUB_WORKSPACE/$LOG_FILE" \
            --output-file "$GITHUB_WORKSPACE/$ANALYSIS_FILE"

      - name: Render Markdown summary
        if: always()
        working-directory: ai-devops-lab
        run: |
          python scripts/render_summary.py \
            --input-file "$GITHUB_WORKSPACE/$ANALYSIS_FILE" \
            --output-file "$GITHUB_WORKSPACE/$SUMMARY_FILE"

      - name: Publish job summary
        if: always()
        shell: bash
        run: cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-cicd-debug-report
          path: |
            ai-devops-lab/samples/build.log
            ai-devops-lab/samples/analysis.json
            ai-devops-lab/samples/summary.md

      - name: Mark job as failed if the simulated build failed
        if: always() && steps.simulated_build.outcome == 'failure'
        shell: bash
        run: |
          echo "The simulated build failed as intended. See the AI summary above." >&2
          exit 1
